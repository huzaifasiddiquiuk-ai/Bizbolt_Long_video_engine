name: Production AI Video Engine

on:
  workflow_dispatch:
  repository_dispatch:
    types: [trigger_video_render]

jobs:
  render-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y ffmpeg libcairo2-dev libpango1.0-dev \
            pkg-config python3-dev libgdk-pixbuf2.0-dev libffi-dev shared-mime-info
          ffmpeg -version

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Libraries
        run: |
          python -m pip install --upgrade pip
          pip install \
            google-api-python-client \
            google-auth-oauthlib \
            google-auth-httplib2 \
            openai-whisper \
            pillow \
            cairosvg \
            requests

      - name: Step 1 - Generate Motion Hook Video
        env:
          DRIVE_CREDENTIALS: ${{ secrets.DRIVE_CREDENTIALS }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
          MAIN_FOLDER_ID: ${{ secrets.MAIN_FOLDER_ID }}
        run: python render_motion.py
        
